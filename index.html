<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Trading Bot</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg-dark); color: var(--text-main); height: 100vh; overflow-x: hidden; }

        /* TELA DE LOGIN */
        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        .login-box {
            background-color: var(--bg-panel); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 350px;
        }
        .login-box h1 { margin-bottom: 20px; font-size: 24px; }
        .login-box input {
            width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; outline: none;
        }
        .btn {
            width: 100%; padding: 12px; border: none; border-radius: 6px; background-color: var(--accent); color: white; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn:hover { background-color: var(--accent-hover); }

        /* TELA DO BOT */
        #dashboard-screen { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 20px; color: var(--text-muted); }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; background: var(--warning); color: #000; }

        .top-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
        .card { background: var(--bg-panel); padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h3 { font-size: 14px; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; }
        .card .value { font-size: 24px; font-weight: bold; }
        .val-profit.positive { color: var(--success); }
        .val-profit.negative { color: var(--danger); }

        .main-panel { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        
        /* Gráfico de Dígitos */
        .chart-container { background: var(--bg-panel); padding: 20px; border-radius: 10px; }
        .chart-container h3 { margin-bottom: 20px; color: var(--text-muted); }
        .digits-grid { display: flex; justify-content: space-between; align-items: flex-end; height: 200px; }
        .digit-bar-wrap { display: flex; flex-direction: column; align-items: center; width: 8%; }
        .digit-pct { font-size: 12px; margin-bottom: 5px; color: var(--text-muted); }
        .bar-track { width: 100%; height: 150px; background: #334155; border-radius: 4px; display: flex; align-items: flex-end; overflow: hidden;}
        .bar-fill { width: 100%; background: var(--accent); transition: height 0.3s ease; }
        .digit-label { margin-top: 10px; font-weight: bold; font-size: 16px; }
        .bar-fill.danger { background: var(--danger); } /* Destacar o 9 */

        /* Controles e Histórico */
        .controls-panel { display: flex; flex-direction: column; gap: 20px; }
        .controls { background: var(--bg-panel); padding: 20px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
        .btn-start { background: var(--success); } .btn-start:hover { background: #059669; }
        .btn-pause { background: var(--warning); color: #000; } .btn-pause:hover { background: #d97706; }
        .btn-stop { background: var(--danger); } .btn-stop:hover { background: #b91c1c; }

        .history { background: var(--bg-panel); padding: 20px; border-radius: 10px; flex-grow: 1; overflow-y: auto; max-height: 400px; }
        .history h3 { margin-bottom: 15px; color: var(--text-muted); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { padding-bottom: 10px; color: var(--text-muted); border-bottom: 1px solid #334155; }
        td { padding: 10px 0; border-bottom: 1px solid #334155; }
        .win-row { color: var(--success); }
        .loss-row { color: var(--danger); }
        
        #error-msg { color: var(--danger); margin-top: 10px; font-size: 14px; display: none; }
    </style>
</head>
<body>

    <!-- TELA 1: CONEXÃO -->
    <div id="login-screen">
        <div class="login-box">
            <h1>Digit Trading Bot</h1>
            <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 14px;">Insira seu Token da API Deriv</p>
            <input type="text" id="api-token" placeholder="Ex: a1b2c3d4e5f6g7h8" autocomplete="off">
            <button class="btn" onclick="connectBot()">Conectar</button>
            <div id="error-msg">Token inválido ou erro de conexão.</div>
        </div>
    </div>

    <!-- TELA 2: DASHBOARD DO BOT -->
    <div id="dashboard-screen">
        <div class="header">
            <h1>Painel Profissional de Trading - DIGITS</h1>
            <div id="bot-status" class="status-badge">PAUSED</div>
        </div>

        <div class="top-cards">
            <div class="card">
                <h3>Balance</h3>
                <div class="value" id="val-balance">$0.00</div>
            </div>
            <div class="card">
                <h3>Profit / Loss</h3>
                <div class="value val-profit" id="val-profit">$0.00</div>
            </div>
            <div class="card">
                <h3>Trades (Win / Total)</h3>
                <div class="value"><span id="val-wins">0</span> / <span id="val-trades">0</span></div>
            </div>
        </div>

        <div class="main-panel">
            <div class="chart-container">
                <h3>Análise de Dígitos (Últimos 25 Ticks)</h3>
                <div class="digits-grid" id="digits-grid">
                    <!-- Barras geradas por JS -->
                </div>
            </div>

            <div class="controls-panel">
                <div class="controls">
                    <button class="btn btn-start" onclick="sendCommand('start')">Start Bot</button>
                    <button class="btn btn-pause" onclick="sendCommand('pause')">Pause Bot</button>
                    <button class="btn btn-stop" onclick="sendCommand('stop')">Stop Bot</button>
                </div>

                <div class="history">
                    <h3>Histórico de Trades</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Contrato</th>
                                <th>Tick</th>
                                <th>Preço</th>
                                <th>Resultado</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <!-- Trades inseridas por JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        
        // Inicializa as barras de dígitos no HTML
        const digitsGrid = document.getElementById('digits-grid');
        for (let i = 0; i <= 9; i++) {
            digitsGrid.innerHTML += `
                <div class="digit-bar-wrap">
                    <div class="digit-pct" id="pct-${i}">0%</div>
                    <div class="bar-track">
                        <div class="bar-fill ${i === 9 ? 'danger' : ''}" id="bar-${i}" style="height: 0%"></div>
                    </div>
                    <div class="digit-label">${i}</div>
                </div>
            `;
        }

        function connectBot() {
            const token = document.getElementById('api-token').value;
            if (!token) return;

            document.getElementById('error-msg').style.display = 'none';
            const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            const host = window.location.host; // Pega automaticamente a porta do Render/Local
            ws = new WebSocket(protocol + host + '/ws');

            ws.onopen = () => {
                ws.send(JSON.stringify({ action: "connect", token: token }));
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === "auth_success") {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('dashboard-screen').style.display = 'block';
                }
                else if (msg.type === "auth_error") {
                    document.getElementById('error-msg').innerText = msg.msg;
                    document.getElementById('error-msg').style.display = 'block';
                }
                else if (msg.type === "dashboard") {
                    updateDashboard(msg);
                }
                else if (msg.type === "stats") {
                    updateChart(msg.stats);
                }
                else if (msg.type === "trade_history") {
                    addTradeToHistory(msg.data);
                }
            };

            ws.onclose = () => {
                alert("Desconectado do servidor. Recarregue a página.");
            };
        }

        function updateDashboard(data) {
            document.getElementById('val-balance').innerText = `$${data.balance.toFixed(2)}`;
            
            const profitEl = document.getElementById('val-profit');
            profitEl.innerText = `$${data.profit.toFixed(2)}`;
            profitEl.className = 'value val-profit ' + (data.profit >= 0 ? 'positive' : 'negative');
            
            document.getElementById('val-trades').innerText = data.trades;
            document.getElementById('val-wins').innerText = data.wins;

            const statusEl = document.getElementById('bot-status');
            let statusText = data.status;
            if(data.recovery && data.status === "ANALYZING") statusText = "RECOVERY MODE";
            
            statusEl.innerText = statusText;
            
            if(statusText.includes("ANALYZING")) statusEl.style.background = "var(--accent)";
            else if(statusText.includes("OPEN")) statusEl.style.background = "var(--success)";
            else if(statusText.includes("RECOVERY")) statusEl.style.background = "#d946ef"; // Roxo
            else statusEl.style.background = "var(--warning)";
        }

        function updateChart(stats) {
            for (let i = 0; i <= 9; i++) {
                const val = stats[i] || 0;
                document.getElementById(`pct-${i}`).innerText = `${val}%`;
                document.getElementById(`bar-${i}`).style.height = `${val}%`;
            }
        }

        function addTradeToHistory(trade) {
            const tbody = document.getElementById('history-body');
            const row = document.createElement('tr');
            row.className = trade.profit > 0 ? 'win-row' : 'loss-row';
            
            row.innerHTML = `
                <td>${trade.type}</td>
                <td>${trade.tick}</td>
                <td>$${trade.stake.toFixed(2)}</td>
                <td>${trade.profit > 0 ? '+' : ''}$${trade.profit.toFixed(2)}</td>
            `;
            
            tbody.prepend(row); // Adiciona no topo
            if(tbody.children.length > 50) tbody.lastChild.remove(); // Limita a 50 itens
        }

        function sendCommand(action) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ action: action }));
            }
        }
    </script>
</body>
</html>
